  - metric: Action Plan 1
    value: Sprint Predictability :  Optimize sprint planning to better identify and
      distribute inter-dependent work and cross-team dependencies in the sprints. →
      Targeting 80-85% predictability by March.
  - metric: Action Plan 2
    value: Dispositioned PDR Bugs:  Expand test automation for recurring PDR scenarios
      while matching resolution speed to incoming PDR bug rates → Reduce the number
      of PDRs bugs by the end of the quarter. 
  - metric: Action Plan 3
    value: 'Investment Allocation: We successfully adjusted the allocation in Feb
      to balance the quarter, and we will keep  adjusting it to achieve a balance
      of 75/5/20. We will reduce the Others to 0 by finish the onboarding of the transferred
      developer and keep focusing solely on tasks for the current quarter without
      including future work and addressing valuable tech debt, PDRs and bugs. → The
      goal is to reach this balanced allocation by the end of the quarter.'
